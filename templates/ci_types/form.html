{% extends "base.html" %}

{% block title %}{{ 'Edit' if ci_type else 'New' }} CI Type{% endblock %}

{% block content %}
<h1 style="margin-bottom: 2rem;">{{ 'Edit' if ci_type else 'New' }} CI Type</h1>

<form method="POST" style="max-width: 600px;">
    <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" class="form-control" id="name" name="name" required 
               value="{{ ci_type.name if ci_type else '' }}" 
               placeholder="e.g., Server, Application, Network Device">
    </div>
    
    <div class="form-group">
        <label for="description">Description</label>
        <textarea class="form-control" id="description" name="description" 
                  placeholder="Describe this CI type">{{ ci_type.description if ci_type else '' }}</textarea>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">{{ 'Update' if ci_type else 'Create' }}</button>
        <a href="{{ url_for('list_ci_types') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
