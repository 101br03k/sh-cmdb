{% extends "base.html" %}

{% block title %}New User{% endblock %}

{% block content %}
<h1 style="margin-bottom: 2rem;">Create New User</h1>

<form method="POST" style="max-width: 500px;">
    <div class="form-group">
        <label for="username">Username *</label>
        <input type="text" class="form-control" id="username" name="username" required autofocus>
    </div>
    
    <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" class="form-control" id="email" name="email" required>
    </div>
    
    <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" class="form-control" id="password" name="password" required minlength="6">
    </div>
    
    <div class="form-group">
        <label style="display: flex; align-items: center; gap: 0.5rem;">
            <input type="checkbox" id="is_admin" name="is_admin">
            <span>Administrator privileges</span>
        </label>
        <small style="color: #666; margin-left: 1.5rem;">Can manage all CI types and users</small>
    </div>
    
    <div class="form-group">
        <label style="display: flex; align-items: center; gap: 0.5rem;">
            <input type="checkbox" id="is_owner" name="is_owner">
            <span>Owner privileges</span>
        </label>
        <small style="color: #666; margin-left: 1.5rem;">Can create and manage own CI types and fields</small>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">Create User</button>
        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
